<body class="bg-gradient-to-br from-sky-100 via-blue-100 to-cyan-50 min-h-screen font-sans text-slate-900 antialiased selection:bg-sky-600 selection:text-white">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Audio Sound Effects with Tone.js ---
    const playSoundEffect = (type) => {
      try {
        if (Tone.context && Tone.context.state !== 'running') {
          Tone.start();
        }
        const synth = new Tone.Synth().toDestination();
        if (type === 'correct') {
          const now = Tone.now();
          synth.triggerAttackRelease("C5", "8n", now);
          synth.triggerAttackRelease("E5", "8n", now + 0.1);
          synth.triggerAttackRelease("G5", "8n", now + 0.2);
        } else if (type === 'wrong') {
          const now = Tone.now();
          synth.triggerAttackRelease("F3", "8n", now);
          synth.triggerAttackRelease("C3", "8n", now + 0.15);
        } else if (type === 'click') {
          synth.triggerAttackRelease("A4", "16n");
        } else if (type === 'reveal') {
          const now = Tone.now();
          synth.triggerAttackRelease("G4", "8n", now);
          synth.triggerAttackRelease("C5", "8n", now + 0.1);
        }
      } catch (e) {
        console.log('Audio playback error:', e);
      }
    };

    // --- Global Audio Pre-Warming & Voice Caching Engine ---
    let cachedVoices = [];
    let audioUnlocked = false;

    const loadVoices = () => {
      if ('speechSynthesis' in window) {
        cachedVoices = window.speechSynthesis.getVoices();
      }
    };

    if ('speechSynthesis' in window) {
      loadVoices();
      if (window.speechSynthesis.onvoiceschanged !== undefined) {
        window.speechSynthesis.onvoiceschanged = loadVoices;
      }
    }

    // Unlock Audio Context & Speech Engine on first interaction
    const unlockAudioEngine = () => {
      if (!audioUnlocked) {
        audioUnlocked = true;
        try {
          if (Tone.context && Tone.context.state !== 'running') {
            Tone.start();
          }
          if ('speechSynthesis' in window) {
            window.speechSynthesis.resume();
            // Silent dummy utterance to prime TTS engine on mobile iOS/Chrome
            const dummy = new SpeechSynthesisUtterance('');
            dummy.volume = 0;
            window.speechSynthesis.speak(dummy);
          }
        } catch(e) {
          console.warn('Audio unlock warning:', e);
        }
      }
    };

    if (typeof window !== 'undefined') {
      window.addEventListener('click', unlockAudioEngine, { once: true });
      window.addEventListener('touchstart', unlockAudioEngine, { once: true });
    }

    // Broadcast speech active status to React state
    const notifySpeechState = (active) => {
      if (typeof window !== 'undefined') {
        window.dispatchEvent(new CustomEvent('speechActiveState', { detail: active }));
      }
    };

    // --- Enhanced Ultra-Reliable Speech Synthesis Helper ---
    let speechWatchdogTimer = null;

    const speakTextWithVoice = (text, { accent = 'US', gender = 'female', rate = 0.85, pitch = 1.0 } = {}) => {
      unlockAudioEngine();

      if (!('speechSynthesis' in window)) {
        console.warn('SpeechSynthesis API not supported on this browser.');
        playSoundEffect('reveal');
        return;
      }

      try {
        // Clear previous stuck watchdog timers
        if (speechWatchdogTimer) clearTimeout(speechWatchdogTimer);

        // Cancel previous utterances to avoid queuing delays
        window.speechSynthesis.cancel();
        if (window.speechSynthesis.paused) {
          window.speechSynthesis.resume();
        }

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = rate;

        let effectivePitch = pitch;
        if (gender === 'male') effectivePitch *= 0.85;
        else if (gender === 'female') effectivePitch *= 1.25;
        utterance.pitch = effectivePitch;

        let targetLocale = 'en-US';
        if (accent === 'UK') targetLocale = 'en-GB';
        else if (accent === 'IE') targetLocale = 'en-IE';
        else if (accent === 'AU') targetLocale = 'en-AU';
        else if (accent === 'NZ') targetLocale = 'en-NZ';
        else if (accent === 'IN') targetLocale = 'en-IN';
        else if (accent === 'CA') targetLocale = 'en-CA';

        let voices = cachedVoices.length > 0 ? cachedVoices : window.speechSynthesis.getVoices();
        
        let matchedVoice = voices.find(v => {
          const langMatch = v.lang.toLowerCase().replace('_', '-').includes(targetLocale.toLowerCase());
          if (!langMatch) return false;
          const vName = v.name.toLowerCase();
          if (gender === 'male') return vName.includes('male') || vName.includes('david') || vName.includes('daniel') || vName.includes('george') || vName.includes('alex');
          if (gender === 'female') return vName.includes('female') || vName.includes('zira') || vName.includes('hazel') || vName.includes('karen') || vName.includes('samantha');
          return true;
        }) || voices.find(v => v.lang.toLowerCase().replace('_', '-').includes(targetLocale.toLowerCase()));

        if (!matchedVoice) {
          matchedVoice = voices.find(v => v.lang.toLowerCase().startsWith('en')) || voices[0];
        }

        if (matchedVoice) {
          utterance.voice = matchedVoice;
          utterance.lang = matchedVoice.lang;
        } else {
          utterance.lang = 'en-US';
        }

        utterance.onstart = () => {
          notifySpeechState(true);
        };

        const handleSpeechEnd = () => {
          if (speechWatchdogTimer) clearTimeout(speechWatchdogTimer);
          notifySpeechState(false);
        };

        utterance.onend = handleSpeechEnd;
        utterance.onerror = handleSpeechEnd;

        // Chrome Watchdog Hack: Prevent speech synthesizer from freezing on long text
        speechWatchdogTimer = setTimeout(() => {
          if (window.speechSynthesis.speaking) {
            window.speechSynthesis.pause();
            window.speechSynthesis.resume();
          }
        }, 7000);

        // Dispatch speech with slight delay for mobile browser thread safety
        setTimeout(() => {
          window.speechSynthesis.speak(utterance);
        }, 50);

      } catch (err) {
        console.error('Speech synthesis error:', err);
        notifySpeechState(false);
        playSoundEffect('reveal');
      }
    };

    function App() {
      const [currentSlide, setCurrentSlide] = useState(1);
      const [viewMode, setViewMode] = useState('presentation'); // 'presentation' | 'worksheets'
      const [isSpeaking, setIsSpeaking] = useState(false);
      
      const [timeLeft, setTimeLeft] = useState(25 * 60);
      const [isTimerRunning, setIsTimerRunning] = useState(false);

      useEffect(() => {
        const handleSpeechState = (e) => setIsSpeaking(e.detail);
        window.addEventListener('speechActiveState', handleSpeechState);
        return () => window.removeEventListener('speechActiveState', handleSpeechState);
      }, []);

      useEffect(() => {
        let interval = null;
        if (isTimerRunning && timeLeft > 0) {
          interval = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
        } else if (timeLeft === 0) {
          setIsTimerRunning(false);
        }
        return () => clearInterval(interval);
      }, [isTimerRunning, timeLeft]);

      const formatTime = (seconds) => {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      };

      const toggleTimer = () => {
        playSoundEffect('click');
        setIsTimerRunning(!isTimerRunning);
      };

      const resetTimer = () => {
        playSoundEffect('click');
        setIsTimerRunning(false);
        setTimeLeft(25 * 60);
      };

      const handleNextSlide = () => {
        if (currentSlide < 8) {
          playSoundEffect('click');
          setCurrentSlide(currentSlide + 1);
          window.scrollTo(0, 0);
        }
      };

      const handlePrevSlide = () => {
        if (currentSlide > 1) {
          playSoundEffect('click');
          setCurrentSlide(currentSlide - 1);
          window.scrollTo(0, 0);
        }
      };

      return (
        <div className="min-h-screen flex flex-col justify-between">
          
          {/* Header Bar with Deep Gradient for High Contrast */}
          <header className="no-print bg-gradient-to-r from-slate-950 via-sky-950 to-blue-950 text-white shadow-2xl sticky top-0 z-50 border-b border-sky-400/40 backdrop-blur-md">
            <div className="max-w-7xl mx-auto px-4 py-3 flex flex-wrap items-center justify-between gap-3">
              
              {/* Branding Title */}
              <div className="flex items-center gap-3">
                <div className="w-11 h-11 bg-gradient-to-br from-sky-500 to-blue-700 text-white rounded-full flex items-center justify-center font-black shadow-lg border-2 border-sky-300 text-xl drop-shadow-text">
                  明
                </div>
                <div>
                  <h1 className="font-extrabold text-base md:text-lg tracking-tight flex items-center gap-2 drop-shadow-text text-white">
                    Meishu Gakuen Hitachi High School - ESL Showcase-見学会2026
                  </h1>
                  <p className="text-xs text-sky-200 font-bold drop-shadow-text">明秀学園日立高等学校 体験授業・学校見学会2026 プレゼンテーション</p>
                </div>
              </div>

              {/* Navigation Slide Buttons */}
              <div className="flex items-center gap-1.5 overflow-x-auto py-1 max-w-full">
                {[
                  { num: 1, label: 'Welcome / 歓迎' },
                  { num: 2, label: '和製英語' },
                  { num: 3, label: 'L & R Game' },
                  { num: 4, label: 'Accents / 発音' },
                  { num: 5, label: 'Phil Quiz' },
                  { num: 6, label: 'Ibaraki Quiz' },
                  { num: 7, label: 'Phone Game' },
                  { num: 8, label: 'Summary / まとめ' },
                ].map(slide => (
                  <button
                    key={slide.num}
                    onClick={() => {
                      playSoundEffect('click');
                      setViewMode('presentation');
                      setCurrentSlide(slide.num);
                    }}
                    className={`px-3 py-1.5 rounded-xl text-xs font-black transition-all whitespace-nowrap flex flex-col items-center ${
                      viewMode === 'presentation' && currentSlide === slide.num
                        ? 'bg-gradient-to-r from-sky-500 to-blue-600 text-white shadow-lg scale-105 ring-2 ring-sky-300 drop-shadow-text'
                        : 'bg-slate-800/90 text-slate-200 hover:bg-slate-700 hover:text-white border border-slate-700 drop-shadow-text'
                    }`}
                  >
                    <span>Slide {slide.num}</span>
                    <span className="text-[10px] opacity-95">{slide.label}</span>
                  </button>
                ))}

                <div className="h-6 w-px bg-slate-700 mx-1"></div>

                {/* Worksheet Button */}
                <button
                  onClick={() => {
                    playSoundEffect('click');
                    setViewMode('worksheets');
                  }}
                  className={`px-3.5 py-1.5 rounded-xl text-xs font-black transition-all flex items-center gap-1.5 ${
                    viewMode === 'worksheets'
                      ? 'bg-emerald-400 text-slate-950 shadow-lg ring-2 ring-emerald-200 drop-shadow-text'
                      : 'bg-emerald-700 text-white hover:bg-emerald-600 border border-emerald-500 drop-shadow-text'
                  }`}
                >
                  <span>📄 Print Worksheets</span>
                </button>
              </div>

              {/* Lesson Timer */}
              <div className="flex items-center gap-2 bg-slate-900/90 px-3 py-1.5 rounded-2xl border border-rose-400/30 shadow-inner">
                <div className="text-right">
                  <div className="text-[9px] uppercase tracking-wider text-rose-300 font-extrabold drop-shadow-text">25-Min Lesson Timer</div>
                  <div className={`font-mono text-base font-black ${timeLeft < 300 ? 'text-rose-400 animate-pulse' : 'text-amber-300'} drop-shadow-text`}>
                    {formatTime(timeLeft)}
                  </div>
                </div>
                <button onClick={toggleTimer} className="p-1.5 bg-slate-800 hover:bg-slate-700 text-white rounded-lg transition border border-slate-600 font-bold">
                  {isTimerRunning ? '⏸️' : '▶️'}
                </button>
                <button onClick={resetTimer} className="p-1.5 bg-slate-800 hover:bg-slate-700 text-white rounded-lg transition border border-slate-600 font-bold">
                  🔄
                </button>
              </div>

            </div>
          </header>

          {/* Main Content Area */}
          <main className="flex-1 max-w-6xl w-full mx-auto p-3 md:p-6">
            {viewMode === 'worksheets' ? (
              <WorksheetsView />
            ) : (
              <div className="bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl border-2 border-slate-200 overflow-hidden transition-all duration-300">
                
                {/* Slide Top Sub-Header */}
                <div className="no-print bg-gradient-to-r from-slate-950 via-sky-950 to-blue-950 text-white px-6 py-4 flex items-center justify-between border-b-2 border-sky-400/40">
                  <div>
                    <span className="text-xs font-black bg-sky-600 text-white px-3 py-1 rounded-full tracking-wider uppercase drop-shadow-text border border-sky-300">
                      Lesson Slide {currentSlide} of 8 / スライド {currentSlide}
                    </span>
                    <h2 className="text-2xl md:text-3xl font-black text-white tracking-tight mt-1.5 drop-shadow-text">
                      {getSlideTitle(currentSlide).en}
                    </h2>
                    <p className="text-xs text-sky-200 font-bold mt-0.5 drop-shadow-text">
                      {getSlideTitle(currentSlide).ja}
                    </p>
                  </div>

                  <button
                    onClick={() => speakTextWithVoice(getSlideTitle(currentSlide).en, { accent: 'US', gender: 'female' })}
                    className="px-4 py-2 bg-sky-700 hover:bg-sky-600 text-white border border-sky-400 rounded-xl text-sm font-black flex items-center gap-1.5 transition shadow-md drop-shadow-text"
                  >
                    🔊 Title Audio / 音声
                  </button>
                </div>

                {/* Slide Content View */}
                <div className="p-5 md:p-8 min-h-[500px]">
                  {currentSlide === 1 && <Slide1Welcome />}
                  {currentSlide === 2 && <Slide2WaseiEigo />}
                  {currentSlide === 3 && <Slide3LRDiff />}
                  {currentSlide === 4 && <Slide4WorldAccents />}
                  {currentSlide === 5 && <Slide5TeacherProfile />}
                  {currentSlide === 6 && <Slide6IbarakiChallenge />}
                  {currentSlide === 7 && <Slide7PhoneNumberGame />}
                  {currentSlide === 8 && <Slide8Conclusion />}
                </div>

                {/* Footer Controls */}
                <div className="no-print bg-slate-50 border-t border-slate-200 px-6 py-4 flex items-center justify-between">
                  <button
                    onClick={handlePrevSlide}
                    disabled={currentSlide === 1}
                    className={`px-5 py-2.5 rounded-2xl font-black text-xs md:text-sm flex items-center gap-2 transition ${
                      currentSlide === 1
                        ? 'opacity-40 cursor-not-allowed bg-slate-200 text-slate-500'
                        : 'bg-slate-800 hover:bg-slate-900 text-white shadow-md drop-shadow-text'
                    }`}
                  >
                    ⬅️ Previous / 前へ
                  </button>

                  <div className="text-xs font-black text-indigo-950 bg-indigo-50/80 px-4 py-1.5 rounded-full border border-indigo-200">
                    Meishu Gakuen Hitachi High School - ESL Showcase-見学会2026
                  </div>

                  <button
                    onClick={handleNextSlide}
                    disabled={currentSlide === 8}
                    className={`px-6 py-2.5 rounded-2xl font-black text-xs md:text-sm flex items-center gap-2 transition shadow-lg ${
                      currentSlide === 8
                        ? 'opacity-40 cursor-not-allowed bg-slate-200 text-slate-500'
                        : 'bg-gradient-to-r from-sky-600 to-blue-700 hover:from-sky-700 hover:to-blue-800 text-white animate-pulse-subtle drop-shadow-text'
                    }`}
                  >
                    Next Slide / 次へ ➡️
                  </button>
                </div>

              </div>
            )}
          </main>

          {/* Page Footer */}
          <footer className="no-print bg-slate-950 text-sky-100 text-center py-4 text-xs border-t border-slate-800 mt-6">
            <p className="font-extrabold text-white drop-shadow-text">Meishu Gakuen Hitachi High School - ESL Showcase-見学会2026</p>
            <p className="text-[11px] text-sky-300 font-medium mt-0.5">明秀学園日立高等学校 英語科 体験授業＆学校見学会2026 インタラクティブ教材</p>
          </footer>

          {/* Compact Floating Audio Playback Indicator */}
          {isSpeaking && (
            <div className="fixed bottom-3 right-3 bg-sky-600/90 backdrop-blur-sm text-white px-3 py-1.5 rounded-full shadow-lg border border-sky-300/50 flex items-center gap-1.5 z-50 text-[11px] font-bold drop-shadow-text transition-all">
              <span className="text-xs animate-pulse">🔊</span>
              <span>Playing Audio / 音声再生中</span>
            </div>
          )}

        </div>
      );
    }

    function getSlideTitle(slide) {
      const titles = {
        1: { en: "Welcome to Meishu High School Showcase 2026!", ja: "明秀学園日立高等学校へようこそ！ (体験授業・見学会2026)" },
        2: { en: "Watch Out for Katakana English Traps!", ja: "気を付けて！和製英語と本当の英語の意味の違い (Pan, Cider, Consent)" },
        3: { en: "Look-alike Letters & Traps: L vs R Sound Game", ja: "文字と発音の注意！ LとRの聞き分けゲーム (Rice vs Lice)" },
        4: { en: "World English & Global Accents", ja: "世界の英語：地域によるアクセントのちがい (会話では自信を持とう！)" },
        5: { en: "Teacher Phil Profile Listening Quiz", ja: "先生の自己紹介を聞き取ってみよう！ (UK Accent Male Quiz)" },
        6: { en: "Ibaraki Foreign Residents Listening Quiz", ja: "茨城県に住む外国人の話を聞いて答えを選ぼう！ (動画＆音声クイズ)" },
        7: { en: "Crack the Secret Phone Number Game!", ja: "【解読ゲーム】言葉のコードを聞いて電話番号を当てよう！" },
        8: { en: "Lesson Summary & Thank You!", ja: "本日の授業のまとめ＆御礼 — 明秀高校でまたお会いしましょう！" }
      };
      return titles[slide] || { en: "", ja: "" };
    }

    function Slide1Welcome() {
      return (
        <div className="space-y-6 animate-fadeIn">
          
          {/* Welcome Banner */}
          <div className="bg-gradient-to-r from-slate-900 via-sky-950 to-blue-900 text-white rounded-3xl p-6 md:p-8 shadow-xl relative overflow-hidden border-2 border-sky-400/30">
            <div className="relative z-10 max-w-3xl">
              <span className="inline-block bg-sky-600 text-white px-3 py-1 rounded-full text-xs font-black tracking-wider mb-2 border border-sky-300 drop-shadow-text">
                School Showcase 2026 / 体験授業・学校見学会2026
              </span>
              <h1 className="text-4xl md:text-6xl font-black tracking-tight leading-tight mb-2 drop-shadow-text-lg text-white">
                Welcome to Meishu High School!
              </h1>
              <p className="text-xl md:text-3xl font-black text-amber-300 drop-shadow-text">
                Let's Practice Listening to English Together! / 楽しく英語リスニング！
              </p>
              <p className="text-sm md:text-base font-extrabold text-sky-100 mt-2 drop-shadow-text">
                明秀学園日立高等学校へようこそ！中学生の皆さん、体験授業で英語の楽しさを発見しましょう！
              </p>
            </div>
            <div className="absolute right-[-10px] bottom-[-20px] opacity-15 text-9xl font-black select-none pointer-events-none text-white">
              2026
            </div>
          </div>

          {/* Cards Grid */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6 items-center">
            
            <div className="bg-white/90 backdrop-blur-sm border-2 border-slate-200 rounded-3xl p-6 shadow-sm hover:border-sky-400 hover:shadow-md transition">
              <div className="flex items-center gap-3 mb-3">
                <span className="text-4xl">🏫</span>
                <div>
                  <h3 className="font-black text-xl text-slate-900">Meishu High School Showcase</h3>
                  <p className="text-xs font-black text-sky-700">明秀学園日立高等学校 見学会2026</p>
                </div>
              </div>
              <p className="text-sm md:text-base text-slate-700 leading-relaxed font-bold">
                Welcome to all junior high students! Today's 25-minute showcase lesson explores Katakana English traps, L vs R sound differences, global accents, teacher quizzes, and code-breaking phone games!
              </p>
              <p className="text-xs text-sky-900 font-extrabold mt-3 bg-sky-50 p-2.5 rounded-xl border border-sky-200">
                高校進学を検討中の中学生の皆さん、明秀高校の英語体験授業へようこそ！リスニングのコツを学びましょう。
              </p>
            </div>

            {/* Lesson Roadmap */}
            <div className="bg-gradient-to-br from-sky-50 to-blue-100 border-2 border-sky-200/80 rounded-3xl p-6">
              <h3 className="font-black text-slate-900 text-lg mb-3 flex items-center gap-2">
                <span>🎯</span> Today's Lesson Roadmap / 本日の学習の流れ
              </h3>

      const accentList = [

        { name: 'Republic of Ireland 🇮🇪', code: 'IE', gender: 'female' },

        { name: 'New Zealand 🇳ℤ', code: 'NZ', gender: 'female' },
        { name: 'India 🇮🇳', code: 'IN', gender: 'male' },
        { name: 'Canada 🇨🇦', code: 'CA', gender: 'female' }
      ];

      const [questionIndex, setQuestionIndex] = useState(0);
      const [currentQuestion, setCurrentQuestion] = useState(null);
      const [userChoice, setUserChoice] = useState(null);
      const [score, setScore] = useState(0);
      const [gameFinished, setGameFinished] = useState(false);

      const startNextQuestion = (nextIdx = questionIndex) => {
        if (nextIdx >= allPairs.length) {
          setGameFinished(true);
          return;
        }
        const pair = allPairs[nextIdx];
        const isL = Math.random() < 0.5;
        const targetWord = isL ? pair.l : pair.r;
        const randomAccent = accentList[Math.floor(Math.random() * accentList.length)];
        
        setCurrentQuestion({
          pair,
          isL,
          word: targetWord,
          accent: randomAccent
        });
        setUserChoice(null);
        
        speakTextWithVoice(targetWord, { accent: randomAccent.code, gender: randomAccent.gender });
      };

      const handleAnswer = (choice) => {
        if (!currentQuestion || userChoice !== null) return;
        setUserChoice(choice);
        const isCorrect = (choice === 'L' && currentQuestion.isL) || (choice === 'R' && !currentQuestion.isL);
        if (isCorrect) {
          playSoundEffect('correct');
          setScore(prev => prev + 1);
        } else {
          playSoundEffect('wrong');
        }
      };

      const handleNextQuestionButton = () => {
        playSoundEffect('click');
        const nextIdx = questionIndex + 1;
        setQuestionIndex(nextIdx);
        startNextQuestion(nextIdx);
      };

      const restartGame = () => {
        playSoundEffect('click');
        setScore(0);
        setQuestionIndex(0);
        setGameFinished(false);
        startNextQuestion(0);
      };

      useEffect(() => {
        startNextQuestion(0);
      }, []);

      return (
